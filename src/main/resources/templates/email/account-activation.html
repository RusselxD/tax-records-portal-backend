<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Your Account</title>
</head>
<body style="margin:0;padding:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background-color:#f9fafb;color:#0f172a;-webkit-font-smoothing:antialiased;">
    <div style="max-width:520px;margin:48px auto;background-color:#ffffff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
        <div style="padding:32px 40px 0;">
            <p style="margin:0;font-size:14px;font-weight:600;color:#6b7280;letter-spacing:0.05em;text-transform:uppercase;">Upturn Tax Records Portal</p>
        </div>
        <div style="padding:24px 40px 40px;">
            <h2 style="margin:0 0 8px;font-size:20px;font-weight:700;color:#0f172a;" th:text="'Welcome, ' + ${firstName} + '!'">Welcome!</h2>
            <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#6b7280;">Your account has been created. Click the button below to activate your account and set your password.</p>
            <a th:href="${activationLink}" style="display:inline-block;padding:10px 24px;background-color:#2563eb;color:#ffffff;text-decoration:none;border-radius:6px;font-size:14px;font-weight:600;">Activate Account</a>
            <div style="margin:32px 0 0;padding:20px 0 0;border-top:1px solid #f3f4f6;">
                <p style="margin:0;font-size:13px;color:#9ca3af;line-height:1.5;">This link will expire in 24 hours. If you did not request this, please ignore this email.</p>
            </div>
        </div>
        <div style="padding:16px 40px;border-top:1px solid #e5e7eb;">
            <p style="margin:0;font-size:12px;color:#9ca3af;">&copy; Upturn Tax Records Portal</p>
        </div>
    </div>
</body>
</html>
